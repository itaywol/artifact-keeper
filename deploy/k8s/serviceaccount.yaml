# IRSA: the role grants S3 access (s3.rs reads AWS_WEB_IDENTITY_TOKEN_FILE,
# injected by the EKS pod-identity webhook). No static S3 keys in-cluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: artifact-keeper
  namespace: artifact-keeper
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/artifact-keeper-s3
