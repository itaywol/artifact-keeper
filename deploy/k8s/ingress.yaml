# ALB via aws-load-balancer-controller. target-type ip (pods directly),
# health check on /readyz (gated on DB + migrations). No session affinity —
# pip pulls are stateless across replicas.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: artifact-keeper
  namespace: artifact-keeper
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:<REGION>:<ACCOUNT_ID>:certificate/<CERT_ID>
    alb.ingress.kubernetes.io/healthcheck-path: /readyz
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/success-codes: "200"
    # PyPI wheels can be large; allow slow/large uploads via twine.
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300
spec:
  ingressClassName: alb
  rules:
    - host: <ARTIFACT_KEEPER_HOST>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: artifact-keeper
                port:
                  number: 80
