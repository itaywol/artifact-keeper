# Non-secret runtime config. Storage = S3 (IRSA, no keys here). Search/OpenSearch
# omitted (curation MVP runs on PG full-text). REDIS_URL points at ElastiCache.
apiVersion: v1
kind: ConfigMap
metadata:
  name: artifact-keeper-config
  namespace: artifact-keeper
data:
  BIND_ADDRESS: "0.0.0.0:8080"
  STORAGE_BACKEND: "s3"
  S3_BUCKET: "<ARTIFACT_BUCKET>"
  S3_REGION: "<REGION>"
  S3_PREFIX: "artifacts"
  REDIS_URL: "redis://<ELASTICACHE_PRIMARY_ENDPOINT>:6379"
  # Connection pool sized per replica; keep 2 * MAX_CONNECTIONS under RDS max.
  DATABASE_MAX_CONNECTIONS: "20"
  DATABASE_MIN_CONNECTIONS: "2"
  RUST_LOG: "info"
