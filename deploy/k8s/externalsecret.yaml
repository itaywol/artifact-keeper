# External Secrets Operator pulls shared secrets from SSM into a k8s Secret.
# CRITICAL: JWT_SECRET and MIGRATION_ENCRYPTION_KEY must be byte-identical
# across both replicas and stable forever — rotating the encryption key makes
# stored upstream credentials (the Remote's pypi auth, webhook secrets)
# undecryptable. Provision the SSM params once; never regenerate.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: artifact-keeper-ssm
  namespace: artifact-keeper
spec:
  provider:
    aws:
      service: ParameterStore
      region: <REGION>
      auth:
        jwt:
          serviceAccountRef:
            name: artifact-keeper
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: artifact-keeper-secrets
  namespace: artifact-keeper
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: artifact-keeper-ssm
    kind: SecretStore
  target:
    name: artifact-keeper-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: /artifact-keeper/prod/database_url
    - secretKey: JWT_SECRET
      remoteRef:
        key: /artifact-keeper/prod/jwt_secret
    - secretKey: MIGRATION_ENCRYPTION_KEY
      remoteRef:
        key: /artifact-keeper/prod/migration_encryption_key
