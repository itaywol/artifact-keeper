apiVersion: apps/v1
kind: Deployment
metadata:
  name: artifact-keeper
  namespace: artifact-keeper
  labels:
    app: artifact-keeper
spec:
  replicas: 2
  selector:
    matchLabels:
      app: artifact-keeper
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: artifact-keeper
    spec:
      serviceAccountName: artifact-keeper
      containers:
        - name: backend
          image: ghcr.io/artifact-keeper/artifact-keeper-backend:<TAG>
          ports:
            - { name: http, containerPort: 8080 }
          envFrom:
            - configMapRef:
                name: artifact-keeper-config
            - secretRef:
                name: artifact-keeper-secrets
          # Migrations run on boot (sqlx advisory-lock makes 2 replicas safe).
          livenessProbe:
            httpGet: { path: /livez, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: artifact-keeper
