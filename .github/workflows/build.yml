name: Build and Push (ripples-backend)

# Self-contained CI for buildecho/ripples-backend. Mirrors the monorepo
# OIDC -> ECR -> platform-deployments bump flow. Builds linux/arm64 (cluster
# nodes are arm64).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target overlay(s)"
        type: choice
        default: dev
        options: [dev, prod, both]

env:
  ECR_REPO: apps/ripples-backend
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    name: Build and Push
    runs-on:
      labels: platform-runner-arm64
    permissions:
      id-token: write
      contents: write # github-tag-action pushes a tag on main
    outputs:
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: minor
          dry_run: ${{ github.ref != 'refs/heads/main' }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.tag.outputs.new_version }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            SQLX_OFFLINE=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-deployment:
    name: Trigger Platform Deployment
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - name: Generate GitHub App Token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BACKOFFICE_GITHUB_APP_ID }}
          private-key: ${{ secrets.BACKOFFICE_GITHUB_APP_PRIVATE_KEY }}
          owner: buildecho

      - name: Bump image tag in platform-deployments
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          gh workflow run update-image-tags.yaml \
            --repo buildecho/platform-deployments \
            --field projects='["ripples-backend"]' \
            --field version="${VERSION}" \
            --field environment="dev" \
            --field pr_title="Deploy ripples-backend to ${VERSION}" \
            --field pr_body="Automated bump from ripples-backend CI (commit ${{ github.sha }})"
